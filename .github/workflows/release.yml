name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: |
          NUM=${GITHUB_REF#refs/tags/v}
          echo "NUM=$NUM" >> $GITHUB_OUTPUT
          echo "TAG=v$NUM" >> $GITHUB_OUTPUT

      - name: Stamp version into all files
        run: |
          V=${{ steps.ver.outputs.NUM }}

          # 1. VERSION file schreiben
          echo "$V" > VERSION

          # 2. manifest.json anpassen
          sed -i "s/\"version\": \".*\"/\"version\": \"${V}\"/" \
            custom_components/pihole_bypass/manifest.json

          # 3. __init__.py CARD_VERSION constant anpassen
          sed -i "s/^CARD_VERSION = \".*\"/CARD_VERSION = \"$V\"/" \
            custom_components/pihole_timer/__init__.py

          # 4. Beide card JS files — version in console.info string anpassen (-E für erweitertes Regex)
          sed -i -E "s/v[0-9]+\.[0-9]+\.[0-9]+/v$V/g" \
            custom_components/pihole_timer/www/pihole-bypass-card.js
          sed -i -E "s/v[0-9]+\.[0-9]+\.[0-9]+/v$V/g" \
            www/pihole-bypass-card.js

          echo "All files stamped with version $V"
          
      - name: Build release zip
        run: |
          V=${{ steps.ver.outputs.NUM }}
          zip -r pihole-bypass-v${V}.zip \
            custom_components/ \
            www/ \
            icon.png \
            VERSION \
            README.md \
            hacs.json \
            -x "*.pyc" -x "__pycache__/*"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PiHole Bypass v${{ steps.ver.outputs.NUM }}"
          files: pihole-bypass-v${{ steps.ver.outputs.NUM }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}