name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract version from tag
        id: ver
        run: |
          NUM=${GITHUB_REF#refs/tags/v}
          echo "NUM=$NUM" >> $GITHUB_OUTPUT
          echo "TAG=v$NUM" >> $GITHUB_OUTPUT
          echo "Releasing version $NUM"

      - name: Stamp version into all files
        run: |
          V=${{ steps.ver.outputs.NUM }}

          # 1. VERSION file
          echo "$V" > VERSION

          # 2. manifest.json
          sed -i "s/\"version\": \".*\"/\"version\": \"${V}\"/" \
            custom_components/pihole_timer/manifest.json

          # 3. __init__.py CARD_VERSION constant
          sed -i "s/^CARD_VERSION = \".*\"/CARD_VERSION = \"$V\"/" \
            custom_components/pihole_timer/__init__.py

          # 4. Both card JS files (version string in console banner)
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/v$V/g" \
            custom_components/pihole_timer/www/pihole-bypass-card.js
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/v$V/g" \
            www/pihole-bypass-card.js

          # 5. Verify all files are consistent
          echo "--- Verification ---"
          echo "VERSION file:     $(cat VERSION)"
          echo "manifest.json:    $(grep '\"version\"' custom_components/pihole_timer/manifest.json)"
          echo "__init__.py:      $(grep '^CARD_VERSION' custom_components/pihole_timer/__init__.py)"
          echo "JS (components):  $(grep 'PIHOLE-BYPASS-CARD' custom_components/pihole_timer/www/pihole-bypass-card.js | head -1)"
          echo "JS (www):         $(grep 'PIHOLE-BYPASS-CARD' www/pihole-bypass-card.js | head -1)"

          # Fail if any file still has a different version
          grep -q "\"version\": \"${V}\"" custom_components/pihole_timer/manifest.json \
            || (echo "ERROR: manifest.json version mismatch!" && exit 1)
          grep -q "^CARD_VERSION = \"${V}\"" custom_components/pihole_timer/__init__.py \
            || (echo "ERROR: __init__.py CARD_VERSION mismatch!" && exit 1)
          grep -q "v${V}" custom_components/pihole_timer/www/pihole-bypass-card.js \
            || (echo "ERROR: JS (custom_components) version mismatch!" && exit 1)
          grep -q "v${V}" www/pihole-bypass-card.js \
            || (echo "ERROR: JS (www) version mismatch!" && exit 1)
          echo "All files consistently stamped with $V"

      - name: Commit version bump back to repo
        run: |
          V=${{ steps.ver.outputs.NUM }}

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            VERSION \
            custom_components/pihole_timer/manifest.json \
            custom_components/pihole_timer/__init__.py \
            custom_components/pihole_timer/www/pihole-bypass-card.js \
            www/pihole-bypass-card.js

          if git diff --cached --quiet; then
            echo "Nothing to commit (files already at $V)"
          else
            git commit -m "chore: stamp version $V [skip ci]"
            git push origin HEAD:$(git remote show origin | grep 'HEAD branch' | awk '{print $NF}')
            echo "Version commit pushed"
          fi

      - name: Build release zip
        run: |
          V=${{ steps.ver.outputs.NUM }}
          zip -r pihole-bypass-v${V}.zip \
            custom_components/ \
            www/ \
            icon.png \
            VERSION \
            README.md \
            hacs.json \
            -x "*.pyc" -x "__pycache__/*"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PiHole Bypass v${{ steps.ver.outputs.NUM }}"
          files: pihole-bypass-v${{ steps.ver.outputs.NUM }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
